<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{normal/base::layout(~{::section})}">
<head>
	<meta charset="UTF-8" />
	<title tx:text="${title}"></title>
	 <link rel="stylesheet" th:href="@{/css/style.css}">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	
</head>
<body>
	<section style="color:white;">
		<h1 style="text:white">Update Contact</h1>
		
		<div class="container mt-5 col-md-7">

    <h2 class="mb-4 d-flex justify-content-center">User Information update Form</h2>
    <form action="#" th:object="${contact}" enctype="multipart/form-data" method="post" th:action="@{/user/process_update}">
    	
    	<input type="hidden" 	th:value="${contact.cid}" name="cid"/>	
    
      <!-- Name -->
      <div class="mb-3">
      	<i class="fas fa-user"></i>
        <label for="name" class="form-label"> First Name</label>
        <input type="text" class="form-control" id="name" name="name" th:value="${contact.name}" required>
      </div>

      <!-- Second Name -->
      <div class="mb-3">
      	<i class="fas fa-id-card"></i>
        <label for="secondName" class="form-label"> Second Name</label>
        <input type="text" class="form-control" id="secondName" name="secondName" th:value="${contact.secondName}">
      </div>

      <!-- Work -->
      <div class="mb-3">
      <i class="fas fa-briefcase"></i>
        <label for="work" class="form-label"> Occupation</label>
        <input type="text" class="form-control" id="work" name="work" th:value="${contact.work}">
      </div>

      <!-- Email -->
      <div class="mb-3">
      	<i class="fas fa-envelope"></i>
        <label for="email" class="form-label"> Email address</label>
        <input type="email" class="form-control" id="email" name="email" th:value="${contact.email}" required>
      </div>

      <!-- Phone -->
      <div class="mb-3">
      	<i class="fas fa-phone"></i>
        <label for="phone" class="form-label"> Phone Number</label>
        <input type="tel" class="form-control" id="phone" name="phone" min=10 th:value="${contact.phone}">
      </div>
		
  	   <!-- image -->
      <div class="mb-3 ">
      	<i class="fas fa-image"></i>
        <label for="imagep" class="form-label"> Image </label><br>
        <img style="height:250px;width: 200px;display:block;margin:0 auto;" src="" th:src="@{'/uploads/images/' + ${contact.image}}" alt="image" class="imagep image-fluid"/>
      </div>
			
		
      <!-- Image -->
      <div class="mb-3">
      <i class="fas fa-image"></i>
        <label for="image" class="form-label"> Profile Image</label>
        <input type="file" class="form-control" id="profileImage" name="profileImage" >
      </div>

      <!-- Description -->
      <div class="mb-3">
      <i class="fas fa-align-left"></i>
        <label for="description" class="form-label"> Description</label>
        <textarea class="form-control" id="mytextarea" name="description" rows="6" maxlength="5000" th:text="${contact.description}"></textarea>
      </div>

      <!-- Submit Button -->
	<div class="d-flex justify-content-center mb-5">
	  <button type="submit" class="btn btn-primary">Submit</button>
	</div>
    </form>
  </div>
  
  <div class="mt-5">&nbsp;</div>


<script th:inline="none">
console.log("script started");

// --- Auto-dismiss alert with slow smooth slide effect ---
document.addEventListener("DOMContentLoaded", function() {
    const alert = document.getElementById("alertMessage");
    if (alert) {
        setTimeout(function() {
            alert.classList.add("hide");   // start slide effect
            setTimeout(() => alert.remove(), 2000); // remove after animation
        }, 2000); // wait 2s before starting animation
    }
});
</script>
    <script src="https://cdn.tiny.cloud/1/a4279d8qeq1se2n7jb1ubl0o0cgbdhfxjlvdly1izpojl268/tinymce/8/tinymce.min.js" referrerpolicy="origin" crossorigin="anonymous"></script>
<script>
      tinymce.init({
        selector: '#mytextarea'
      });
    </script>
	
</body>


</html>
